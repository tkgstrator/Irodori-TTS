base_checkpoint: models/Irodori-TTS-500M-v2/model.safetensors
base_hf_repo: Aratako/Irodori-TTS-500M-v2
base_hf_filename: model.safetensors

model_device: cuda
codec_device: cuda
model_precision: bf16
codec_precision: fp32
codec_repo: Aratako/Semantic-DACVAE-Japanese-32dim
codec_deterministic_encode: true
codec_deterministic_decode: true
enable_watermark: false

# VoiceDesign (caption) runtime — loaded alongside the LoRA base model.
# If both caption_checkpoint and caption_hf_repo are omitted, caption
# speakers in VDS scripts will return 501.
caption_checkpoint: models/Irodori-TTS-500M-v2-VoiceDesign/model.safetensors
caption_hf_repo: Aratako/Irodori-TTS-500M-v2-VoiceDesign
caption_hf_filename: model.safetensors

# LoRA adapters are auto-discovered as single-file .safetensors exports under
# this directory. Each file carries its own metadata (name, uuid, defaults,
# adapter_config) so no per-speaker block is required.
#
# To add a new speaker: export a PEFT checkpoint to a .safetensors file with
#   uv run python scripts/lora/export_lora_to_safetensors.py \
#     --input outputs/<speaker>_lora/checkpoint_xxx \
#     --output models/LoRA/<speaker>.safetensors \
#     --name "<display name>" \
#     --defaults '{"num_steps": 40, "cfg_scale_text": 3.0, "cfg_scale_speaker": 5.0}'
lora_dir: models/LoRA
