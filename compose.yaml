services:
  tts:
    build:
      context: .
      dockerfile: Dockerfile
    image: tkgling/irodori-tts-server:latest
    container_name: irodori-tts
    ports:
      - 8765:8765
    volumes:
      - ./configs/tts_server.yaml:/app/config.yaml:ro
      - ./models:/app/models:ro
      - ./outputs:/app/outputs:ro
      - hf_cache:/root/.cache/huggingface
    environment:
      TTS_HOST: 0.0.0.0
      TTS_PORT: 8765
      HF_HOME: /root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    image: tkgling/irodori-tts-train:latest
    container_name: irodori-tts-train
    env_file:
      # Expected keys in .env:
      #   HF_TOKEN
      #   WANDB_API_KEY
      #   WANDB_BASE_URL            (e.g. https://wandb.tkgstrator.work)
      #   CF_ACCESS_CLIENT_ID       (Cloudflare Access service token)
      #   CF_ACCESS_CLIENT_SECRET
      - .env
    environment:
      HF_HOME: /root/.cache/huggingface
      # Override these at `docker compose run` time:
      #   HF_DATASET: ultemica/irodori-tts-voices
      #   SPEAKERS: margo,leia
      #   NUM_GPUS: 8
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./models:/app/models
      - hf_cache:/root/.cache/huggingface
      - train_venv:/app/.venv
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf_cache:
  train_venv:
