services:
  tts:
    image: tkgling/irodori-tts:latest
    container_name: irodori-tts
    ports:
      - 8765:8765
    volumes:
      - ./configs/runtime.yaml:/app/config.yaml:ro
      - ./models:/app/models:ro
      - hf_cache:/root/.cache/huggingface
      - tts_venv:/app/.venv
    environment:
      TTS_HOST: 0.0.0.0
      TTS_PORT: 8765
      HF_HOME: /root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

volumes:
  hf_cache:
  tts_venv:
